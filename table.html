<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きっかけ表</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav id="main-nav">
  <!-- ロールに応じて動的に生成 -->
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn-sm" onclick="logout()">ログアウト</button>
  </div>
</nav>
<main>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <h1>きっかけ表</h1>
    <button onclick="window.print()" id="print-btn" style="display:none;">印刷 / PDF保存</button>
  </div>
  <div id="live-btns" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>
  <p id="empty-msg" style="color:#888;display:none;">まだ提出がありません</p>
  <div style="overflow-x:auto;margin-bottom:24px;">
    <table id="kikkake-table" class="kikkake-table" style="display:none;">
      <thead>
        <tr>
          <th>出番</th><th>コンビ名</th><th>形式</th><th>③道具</th><th>④板付</th>
          <th>⑤音響</th><th>⑤照明</th><th>⑥明転</th><th>⑦暗転</th><th>⑧出囃子</th>
          <th>音源</th><th>台本</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
</main>
<style>@media print{nav,button{display:none!important}}</style>
<script>
const SUPABASE_URL = 'https://hmfbbpglitxggrfxghsd.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZmJicGdsaXR4Z2dyZnhnaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzQ4ODAsImV4cCI6MjA5MTU1MDg4MH0.lM2QipgSzFuHqS-IQ5_CndIBTiMQd43kvdMCXLcAkSA'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { location.href = 'index.html'; return }

  const { data: profile } = await sb.from('profiles').select('*').eq('id', session.user.id).single()
  const role = profile?.role || 'performer'
  document.getElementById('nav-user').textContent = profile?.display_name || session.user.email

  // ロールに応じてナビを生成
  const nav = document.getElementById('main-nav')
  if (role === 'staff') {
    nav.innerHTML = `
      <a href="staff.html">スタッフページ</a>
      <a href="table.html" class="active">きっかけ表</a>
      <div class="nav-right">
        <span class="nav-user">${profile?.display_name || session.user.email}</span>
        <button class="btn-sm" onclick="logout()">ログアウト</button>
      </div>`
  } else {
    nav.innerHTML = `
      <a href="form.html">フォーム提出</a>
      <a href="table.html" class="active">きっかけ表</a>
      <a href="mypage.html">マイページ</a>
      <div class="nav-right">
        <span class="nav-user">${profile?.display_name || session.user.email}</span>
        <button class="btn-sm" onclick="logout()">ログアウト</button>
      </div>`
  }

  // スタッフは担当ライブのみ、演者は全ライブ表示
  let lives = []
  if (role === 'staff') {
    const { data: sl } = await sb.from('staff_lives').select('live_id').eq('user_id', session.user.id)
    const myIds = (sl || []).map(s => s.live_id)
    if (myIds.length) {
      const { data } = await sb.from('lives').select('*').in('id', myIds).order('created_at', { ascending: false })
      lives = data || []
    }
  } else {
    const { data } = await sb.from('lives').select('*').order('created_at', { ascending: false })
    lives = data || []
  }

  const container = document.getElementById('live-btns')
  if (!lives.length) {
    container.innerHTML = '<p class="hint">表示できるライブがありません</p>'
    return
  }
  lives.forEach(l => {
    const btn = document.createElement('button')
    btn.textContent = l.name
    btn.className = 'tog-btn'
    btn.onclick = () => loadEntries(l.id, btn)
    container.appendChild(btn)
  })
}

async function loadEntries(liveId, btn) {
  document.querySelectorAll('#live-btns .tog-btn').forEach(b => b.classList.remove('active-info'))
  btn.classList.add('active-info')
  document.getElementById('print-btn').style.display = 'inline-block'

  const { data } = await sb.from('entries').select('*').eq('live_id', liveId).order('order', { ascending: true })
  const entries = data || []
  const tbody = document.getElementById('table-body')
  tbody.innerHTML = ''

  if (!entries.length) {
    document.getElementById('kikkake-table').style.display = 'none'
    document.getElementById('empty-msg').style.display = 'block'
    return
  }
  document.getElementById('empty-msg').style.display = 'none'
  document.getElementById('kikkake-table').style.display = 'table'

  entries.forEach(e => {
    const onUrl = e.on_file_path ? sb.storage.from('kikkake-files').getPublicUrl(e.on_file_path).data.publicUrl : null
    const scriptUrl = e.script_file_path ? sb.storage.from('kikkake-files').getPublicUrl(e.script_file_path).data.publicUrl : null
    const tr = document.createElement('tr')
    tr.innerHTML = `
      <td>${e.order ?? '<span class="muted">−</span>'}</td>
      <td style="font-weight:500;">${e.combi_name}${e.is_updated ? '<span class="badge badge-updated">更新</span>' : ''}</td>
      <td>${e.format ? `<span class="badge badge-info">${e.format}</span>` : '<span class="muted">−</span>'}</td>
      <td>${e.tools || '<span class="muted">−</span>'}</td>
      <td>${e.itatsuki || '<span class="muted">−</span>'}</td>
      <td>${e.chuku_on === '有り' ? '<span class="badge badge-warn">有り</span>' : e.chuku_on === '無し' ? '<span class="badge badge-ok">無し</span>' : '<span class="muted">−</span>'}</td>
      <td>${e.chuku_hari === '有り' ? '<span class="badge badge-warn">有り</span>' : e.chuku_hari === '無し' ? '<span class="badge badge-ok">無し</span>' : '<span class="muted">−</span>'}</td>
      <td>${e.meiten_kikake || '<span class="muted">−</span>'}</td>
      <td>${e.anten_kikake || '<span class="muted">−</span>'}</td>
      <td style="white-space:nowrap;">${e.debayashi_full || '<span class="muted">−</span>'}</td>
      <td>${onUrl ? `<a href="${onUrl}" target="_blank" download style="color:#0d6efd;font-size:12px;">DL</a>` : '<span class="muted">−</span>'}</td>
      <td>${scriptUrl ? `<a href="${scriptUrl}" target="_blank" download style="color:#0d6efd;font-size:12px;">DL</a>` : '<span class="muted">−</span>'}</td>
    `
    tbody.appendChild(tr)
  })
}

function logout() { sb.auth.signOut().then(() => location.href = 'index.html') }
init()
</script>
</body>
</html>
