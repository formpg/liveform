
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>きっかけ表</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
  <a href="form.html">フォーム提出</a>
  <a href="table.html" class="active">きっかけ表</a>
  <a href="mypage.html">マイページ</a>
  <div class="nav-right">
    <span class="nav-user" id="nav-user"></span>
    <button class="btn-sm" onclick="logout()">ログアウト</button>
  </div>
</nav>
<main>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;">
    <h1>きっかけ表</h1>
    <button onclick="window.print()" id="print-btn" style="display:none;">印刷 / PDF保存</button>
  </div>
  <div id="live-btns" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;"></div>
  <p id="empty-msg" style="color:#888;display:none;">まだ提出がありません</p>
  <div style="overflow-x:auto;margin-bottom:24px;">
    <table id="kikkake-table" class="kikkake-table" style="display:none;">
      <thead><tr><th>出番</th><th>コンビ名</th><th>形式</th><th>③道具</th><th>④板付</th><th>⑤音響</th><th>⑤照明</th><th>⑥明転</th><th>⑦暗転</th><th>⑧出囃子</th><th>音源</th><th>台本</th></tr></thead>
      <tbody id="table-body"></tbody>
    </table>
  </div>
  <div id="on-box" style="display:none;background:#fffbea;border:1px solid #ffc107;border-radius:8px;padding:12px 14px;">
    <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
      <span style="font-weight:500;color:#856404;font-size:13px;">音響担当者（日置汐穏）へ</span>
      <button onclick="copyOnText()" style="font-size:12px;">コピー</button>
    </div>
    <pre id="on-text" style="font-size:12px;color:#666;white-space:pre-wrap;line-height:1.7;"></pre>
  </div>
</main>
<style>@media print{nav,button{display:none!important}}</style>
<script>
const SUPABASE_URL = 'https://hmfbbpglitxggrfxghsd.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZmJicGdsaXR4Z2dyZnhnaHNkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5NzQ4ODAsImV4cCI6MjA5MTU1MDg4MH0.lM2QipgSzFuHqS-IQ5_CndIBTiMQd43kvdMCXLcAkSA'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (!session) { location.href='index.html'; return }
  const { data: profile } = await sb.from('profiles').select('*').eq('id',session.user.id).single()
  document.getElementById('nav-user').textContent=profile?.display_name||session.user.email
  const { data: lives } = await sb.from('lives').select('*').order('created_at',{ascending:false})
  const container=document.getElementById('live-btns')
  ;(lives||[]).forEach(l=>{const btn=document.createElement('button');btn.textContent=l.name;btn.className='tog-btn';btn.onclick=()=>loadEntries(l.id,btn);container.appendChild(btn)})
}

async function loadEntries(liveId, btn) {
  document.querySelectorAll('#live-btns .tog-btn').forEach(b=>b.classList.remove('active-info'))
  btn.classList.add('active-info')
  document.getElementById('print-btn').style.display='inline-block'
  const { data } = await sb.from('entries').select('*').eq('live_id',liveId).order('order',{ascending:true})
  const entries=data||[], tbody=document.getElementById('table-body')
  tbody.innerHTML=''
  if (!entries.length) { document.getElementById('kikkake-table').style.display='none'; document.getElementById('empty-msg').style.display='block'; document.getElementById('on-box').style.display='none'; return }
  document.getElementById('empty-msg').style.display='none'
  document.getElementById('kikkake-table').style.display='table'
  entries.forEach(e=>{
    const onUrl=e.on_file_path?sb.storage.from('kikkake-files').getPublicUrl(e.on_file_path).data.publicUrl:null
    const scriptUrl=e.script_file_path?sb.storage.from('kikkake-files').getPublicUrl(e.script_file_path).data.publicUrl:null
    const tr=document.createElement('tr')
    tr.innerHTML=`<td>${e.order??'<span class="muted">−</span>'}</td><td style="font-weight:500;">${e.combi_name}${e.is_updated?'<span class="badge badge-updated">更新</span>':''}</td><td>${e.format?`<span class="badge badge-info">${e.format}</span>`:'<span class="muted">−</span>'}</td><td>${e.tools||'<span class="muted">−</span>'}</td><td>${e.itatsuki||'<span class="muted">−</span>'}</td><td>${e.chuku_on==='有り'?'<span class="badge badge-warn">有り</span>':e.chuku_on==='無し'?'<span class="badge badge-ok">無し</span>':'<span class="muted">−</span>'}</td><td>${e.chuku_hari==='有り'?'<span class="badge badge-warn">有り</span>':e.chuku_hari==='無し'?'<span class="badge badge-ok">無し</span>':'<span class="muted">−</span>'}</td><td>${e.meiten_kikake||'<span class="muted">−</span>'}</td><td>${e.anten_kikake||'<span class="muted">−</span>'}</td><td>${e.debayashi_full||'<span class="muted">−</span>'}</td><td>${onUrl?`<a href="${onUrl}" target="_blank" download style="color:#0d6efd;font-size:12px;">DL</a>`:'<span class="muted">−</span>'}</td><td>${scriptUrl?`<a href="${scriptUrl}" target="_blank" download style="color:#0d6efd;font-size:12px;">DL</a>`:'<span class="muted">−</span>'}</td>`
    tbody.appendChild(tr)
  })
  const onNeeded=entries.filter(e=>e.chuku_on==='有り')
  document.getElementById('on-text').textContent=onNeeded.length?onNeeded.map(e=>`【${e.combi_name} ${e.order??''}番目】\n音源: ${e.on_file_path?'添付あり':'要確認'}\n暗転: ${e.anten_kikake||'未記入'}`).join('\n\n'):'途中音響あり組なし'
  document.getElementById('on-box').style.display='block'
}

function copyOnText() { navigator.clipboard.writeText(document.getElementById('on-text').textContent).then(()=>alert('コピーしました！')) }
function logout() { sb.auth.signOut().then(()=>location.href='index.html') }
init()
</script>
</body>
</html>
